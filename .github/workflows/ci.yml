name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Syntax check
        run: pnpm run check:syntax
      - name: Capability matrix check
        run: pnpm run check:capabilities
      - name: Compatibility checks
        run: pnpm run check:compatibility
      - name: Workspace lint
        run: pnpm -r --if-present run lint
      - name: Test
        run: pnpm test
      - name: Workspace typecheck
        run: pnpm -r --if-present run typecheck
