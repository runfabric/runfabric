name: Publish daemon image to GHCR

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DAEMON_IMAGE: ghcr.io/runfabric/runfabric-daemon:latest
      DAEMON_GO_BUILDER_IMAGE: public.ecr.aws/docker/library/golang:1.25-alpine
      DAEMON_RUNTIME_IMAGE: public.ecr.aws/docker/library/alpine:3.21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build daemon image
        run: make docker-daemon-build

      - name: Smoke test daemon image
        run: docker run --rm "${DAEMON_IMAGE}" --help >/dev/null

      - name: Push daemon image
        run: docker push "${DAEMON_IMAGE}"
