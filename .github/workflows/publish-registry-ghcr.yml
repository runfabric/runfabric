name: Publish registry image to GHCR

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_IMAGE: ghcr.io/runfabric/runfabric-registry:latest
      REGISTRY_WEB_BUILDER_IMAGE: public.ecr.aws/docker/library/node:24-alpine
      REGISTRY_GO_BUILDER_IMAGE: public.ecr.aws/docker/library/golang:1.25-alpine
      REGISTRY_RUNTIME_IMAGE: public.ecr.aws/docker/library/alpine:3.21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build registry image
        run: make docker-registry-build

      - name: Smoke test registry image
        run: docker run --rm "${REGISTRY_IMAGE}" --help >/dev/null

      - name: Push registry image
        run: docker push "${REGISTRY_IMAGE}"
