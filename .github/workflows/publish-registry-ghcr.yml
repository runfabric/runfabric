name: Publish registry image to GHCR

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_IMAGE: ghcr.io/runfabric/runfabric-registry:latest
      WEB_BUILDER_IMAGE: public.ecr.aws/docker/library/node:24-alpine
      GO_BUILDER_IMAGE: public.ecr.aws/docker/library/golang:1.25-alpine
      RUNTIME_IMAGE: public.ecr.aws/docker/library/alpine:3.21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build registry image
        run: |
          docker build -f apps/registry/Dockerfile \
            --build-arg WEB_BUILDER_IMAGE="${WEB_BUILDER_IMAGE}" \
            --build-arg GO_BUILDER_IMAGE="${GO_BUILDER_IMAGE}" \
            --build-arg RUNTIME_IMAGE="${RUNTIME_IMAGE}" \
            -t "${REGISTRY_IMAGE}" .

      - name: Smoke test registry image
        run: docker run --rm "${REGISTRY_IMAGE}" --help >/dev/null

      - name: Push registry image
        run: docker push "${REGISTRY_IMAGE}"
