<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">

<style>
.text { font-family: Arial, Helvetica, sans-serif; font-weight: 600; }
.fabric { fill:#6366f1; }
.run { fill:#0ea5e9; }
.node { fill:#38bdf8; }
.line { stroke:#6366f1; stroke-width:2; }
</style>

<!-- fabric nodes -->
<circle cx="40" cy="60" r="8" class="node"></circle>
<circle cx="80" cy="30" r="8" class="node"></circle>
<circle cx="80" cy="90" r="8" class="node"></circle>
<circle cx="120" cy="60" r="8" class="node"></circle>

<!-- connecting lines -->
<line x1="40" y1="60" x2="80" y2="30" class="line"></line>
<line x1="40" y1="60" x2="80" y2="90" class="line"></line>
<line x1="80" y1="30" x2="120" y2="60" class="line"></line>
<line x1="80" y1="90" x2="120" y2="60" class="line"></line>

<!-- text -->
<text x="150" y="70" font-size="38" class="text">
<tspan class="run">Run</tspan>
<tspan class="fabric">Fabric</tspan>
</text>

</svg>