service: handler-scenario-multi
provider:
  name: aws-lambda
  runtime: nodejs

functions:
  - name: api
    entry: src/index.ts
    triggers:
      - type: http
        method: GET
        path: /health
  - name: public-api
    entry: src/public.ts
    triggers:
      - type: http
        method: GET
        path: /public
  - name: admin-api
    entry: src/admin.ts
    triggers:
      - type: http
        method: POST
        path: /admin
  - name: webhook
    entry: src/webhook.ts
    triggers:
      - type: http
        method: POST
        path: /webhook
