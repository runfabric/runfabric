service: hello-api

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION,ap-southeast-1}

# backend:
#   kind: aws
#   s3Bucket: ${env:RUNFABRIC_S3_BUCKET}
#   s3Prefix: runfabric/dev
#   lockTable: ${env:RUNFABRIC_DYNAMODB_TABLE}

backend:
  kind: aws
  s3Bucket: runfabric
  s3Prefix: apps/dev
  lockTable: rf-locks

aiWorkflow:
  enable: true
  entrypoint: start
  nodes:
    - id: start
      type: trigger
      params:
        note: example-only (Phase 14)
    - id: callHello
      type: system
      params:
        function: hello
  edges:
    - from: start
      to: callHello

functions:
  hello:
    handler: src/handler.hello
    memory: 128
    timeout: 10
    events:
      - http:
          path: /hello
          method: get

  createUser:
    handler: src/handler.createUser
    memory: 128
    timeout: 10
    events:
      - http:
          path: /users
          method: post