service: hello-api

provider:
  name: aws-lambda
  runtime: nodejs20.x
  region: ${env:AWS_REGION,ap-southeast-1}

# backend:
#   kind: s3
#   s3Bucket: ${env:RUNFABRIC_S3_BUCKET}
#   s3Prefix: runfabric/dev
#   lockTable: ${env:RUNFABRIC_DYNAMODB_TABLE}

backend:
  kind: s3
  s3Bucket: runfabric
  s3Prefix: apps/dev
  lockTable: rf-locks

workflows:
  - name: hello-flow
    steps:
      - function: hello

functions:
  - name: hello
    entry: src/handler.hello
    triggers:
      - type: http
        path: /hello
        method: GET

  - name: createUser
    entry: src/handler.createUser
    triggers:
      - type: http
        path: /users
        method: POST
