apiVersion: runfabric/v1
kind: provider
id: aws-lambda
name: aws-lambda
description: External provider plugin for AWS Lambda
version: 0.1.0
pluginVersion: 1
executable: ./bin/aws-plugin
capabilities: [doctor, plan, deploy, remove, invoke, logs]
supportsRuntime: [nodejs, python]
supportsTriggers: [http]
supportsResources: []
permissions:
  fs: true
  env: true
  network: true
  cloud: true
