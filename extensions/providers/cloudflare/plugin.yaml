apiVersion: runfabric/v1
kind: provider
id: cloudflare-workers
name: cloudflare-workers
description: External provider plugin for Cloudflare Workers
version: 0.1.0
pluginVersion: 1
executable: ./bin/cloudflare-plugin
capabilities: [doctor, plan, deploy, remove, invoke, logs]
supportsRuntime: [nodejs, python]
supportsTriggers: [http]
supportsResources: []
permissions:
  fs: true
  env: true
  network: true
  cloud: true
