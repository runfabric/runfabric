apiVersion: runfabric/v1
kind: provider
id: fly-machines
name: fly-machines
description: External provider plugin for Fly Machines
version: 0.1.0
pluginVersion: 1
executable: ./bin/fly-plugin
capabilities: [doctor, plan, deploy, remove, invoke, logs]
supportsRuntime: [nodejs, python]
supportsTriggers: [http]
supportsResources: []
permissions:
  fs: true
  env: true
  network: true
  cloud: true
