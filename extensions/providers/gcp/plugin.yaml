apiVersion: runfabric/v1
kind: provider
id: gcp-functions
name: gcp-functions
description: External provider plugin for GCP Functions
version: 0.1.0
pluginVersion: 1
executable: ./bin/gcp-plugin
capabilities: [doctor, plan, deploy, remove, invoke, logs]
supportsRuntime: [nodejs, python]
supportsTriggers: [http]
supportsResources: []
permissions:
  fs: true
  env: true
  network: true
  cloud: true
