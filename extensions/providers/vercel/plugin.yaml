apiVersion: runfabric/v1
kind: provider
id: vercel
name: vercel
description: External provider plugin for Vercel
version: 0.1.0
pluginVersion: 1
executable: ./bin/vercel-plugin
capabilities: [doctor, plan, deploy, remove, invoke, logs]
supportsRuntime: [nodejs, python]
supportsTriggers: [http]
supportsResources: []
permissions:
  fs: true
  env: true
  network: true
  cloud: true
