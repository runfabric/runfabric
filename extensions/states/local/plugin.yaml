name: Local State Backend
description: External state backend plugin for local receipts, journals, and locks
version: 0.1.0
pluginVersion: 1
executable: ./bin/local-state
capabilities:
  - state:local
  - backend:local
permissions:
  fs: true
  env: true
  network: false
  cloud: false
