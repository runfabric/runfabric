services:
  registry:
    build:
      context: ..
      dockerfile: apps/registry-api/Dockerfile
    image: runfabric-registry:latest
    ports:
      - "8787:8787"
    environment:
      REGISTRY_LISTEN: 0.0.0.0:8787
      REGISTRY_WEB_DIR: /app/web/dist
      REGISTRY_UI_AUTH_URL: https://auth.runfabric.cloud/device
      REGISTRY_UI_DOCS_URL: https://runfabric.cloud/docs
      REGISTRY_METADATA_PROVIDER: json
      REGISTRY_ALLOW_ANONYMOUS_READ: "true"
    volumes:
      - ../apps/registry-api/data:/app/data
    restart: unless-stopped
