services:
  registry:
    image: ${REGISTRY_IMAGE:-runfabric-registry:local}
    build:
      context: ..
      dockerfile: apps/registry/Dockerfile
      args:
        WEB_BUILDER_IMAGE: ${WEB_BUILDER_IMAGE:-public.ecr.aws/docker/library/node:24-alpine}
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-public.ecr.aws/docker/library/golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-public.ecr.aws/docker/library/alpine:3.21}
    ports:
      - "8787:8787"
    environment:
      REGISTRY_LISTEN: 0.0.0.0:8787
      REGISTRY_WEB_DIR: /app/web/dist
      REGISTRY_UI_AUTH_URL: https://auth.runfabric.cloud/device
      REGISTRY_UI_DOCS_URL: https://runfabric.cloud/docs
      REGISTRY_METADATA_PROVIDER: json
      REGISTRY_ALLOW_ANONYMOUS_READ: "true"
    volumes:
      - ../apps/registry/data:/app/data
    restart: unless-stopped
